<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Envios · Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#093E34',
            slab: '#305D54',
            accent: '#16836D',
            accentBright: '#1BA085',
            lime: '#8DC540'
          },
          fontFamily: {
            sans: ['Host Grotesk', 'ui-sans-serif', 'system-ui', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-ink font-sans text-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <img src="/img/logo-white.png" alt="smar(apd)" class="mx-auto h-11 w-auto" />
      <h1 class="mt-5 text-2xl font-semibold tracking-tight">Controle de Envios</h1>
      <p class="mt-1 text-sm text-slate-300">Validação mensal AUDESP · Gestão de clientes</p>
    </div>

    <div class="rounded-xl border border-slab bg-slab p-6 shadow-2xl">
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="username" class="mb-1 block text-sm font-medium text-slate-200">Usuário</label>
          <input id="username" name="username" type="text" autocomplete="username" required
            class="w-full rounded-lg border border-white/20 bg-ink px-3 py-2 text-sm outline-none focus:border-accentBright focus:ring-1 focus:ring-accentBright" />
        </div>
        <div>
          <label for="password" class="mb-1 block text-sm font-medium text-slate-200">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="w-full rounded-lg border border-white/20 bg-ink px-3 py-2 text-sm outline-none focus:border-accentBright focus:ring-1 focus:ring-accentBright" />
        </div>
        <div id="loginError" class="hidden rounded-lg border border-red-500/40 bg-red-500/10 px-3 py-2 text-sm text-red-300"></div>
        <button id="loginBtn" type="submit"
          class="w-full rounded-lg bg-accent px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-accentBright focus:outline-none focus:ring-2 focus:ring-accentBright focus:ring-offset-2 focus:ring-offset-slab disabled:opacity-60">
          Entrar
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs text-slate-400">Acesso restrito. Sessões expiram automaticamente.</p>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
