<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Envios · Acesso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0f172a',
            slab: '#1e293b',
            accent: '#4f46e5'
          },
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-ink font-sans text-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-lg bg-accent text-lg font-bold">CE</div>
      <h1 class="mt-4 text-2xl font-semibold tracking-tight">Controle de Envios</h1>
      <p class="mt-1 text-sm text-slate-400">Validação mensal AUDESP · Gestão de clientes</p>
    </div>

    <div class="rounded-xl border border-slate-700 bg-slab p-6 shadow-2xl">
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="username" class="mb-1 block text-sm font-medium text-slate-300">Usuário</label>
          <input id="username" name="username" type="text" autocomplete="username" required
            class="w-full rounded-lg border border-slate-600 bg-ink px-3 py-2 text-sm outline-none focus:border-accent focus:ring-1 focus:ring-accent" />
        </div>
        <div>
          <label for="password" class="mb-1 block text-sm font-medium text-slate-300">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
            class="w-full rounded-lg border border-slate-600 bg-ink px-3 py-2 text-sm outline-none focus:border-accent focus:ring-1 focus:ring-accent" />
        </div>
        <div id="loginError" class="hidden rounded-lg border border-red-500/40 bg-red-500/10 px-3 py-2 text-sm text-red-300"></div>
        <button id="loginBtn" type="submit"
          class="w-full rounded-lg bg-accent px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-slab disabled:opacity-60">
          Entrar
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs text-slate-500">Acesso restrito. Sessões expiram automaticamente.</p>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
