<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Envios · Parametrização</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { ink: '#093E34', slab: '#305D54', accent: '#16836D', accentBright: '#1BA085', lime: '#8DC540' }, fontFamily: { sans: ['Host Grotesk', 'ui-sans-serif', 'system-ui', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] } } }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-100 font-sans text-slate-800">
  <header class="border-b border-slate-200 bg-ink text-slate-100">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <div class="flex items-center gap-3">
        <img src="/img/logo-white.png" alt="smar(apd)" class="h-6 w-auto" />
        <span class="font-semibold tracking-tight">Controle de Envios</span>
      </div>
      <nav class="flex items-center gap-1 text-sm">
        <a href="/app.html" class="rounded px-3 py-1.5 text-slate-300 hover:bg-white/10">Tabela</a>
        <a href="/dashboard.html" class="rounded px-3 py-1.5 text-slate-300 hover:bg-white/10">Dashboard</a>
        <a href="/prazos.html" class="rounded px-3 py-1.5 font-medium text-white bg-white/10">Parametrização</a>
        <a href="/usuarios.html" class="rounded px-3 py-1.5 text-slate-300 hover:bg-white/10">Usuários</a>
        <div class="mx-2 h-5 w-px bg-white/20"></div>
        <div id="userNome" class="text-sm font-medium"></div>
        <button onclick="logout()" class="ml-2 rounded px-3 py-1.5 text-slate-300 hover:bg-white/10">Sair</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-6">
    <div class="mb-4 flex flex-wrap items-end justify-between gap-3">
      <div>
        <h1 class="text-xl font-semibold tracking-tight">Parametrização de prazos (TCE-SP)</h1>
        <p class="text-sm text-slate-500">Defina o prazo final de cada período de prestação de contas.</p>
      </div>
      <div class="flex items-center gap-2">
        <select id="anoSelect" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-accent"></select>
        <button onclick="abrirNovoAno()" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium hover:bg-slate-50">Novo ano</button>
      </div>
    </div>

    <div id="novoAnoBox" class="mb-4 hidden items-center gap-2 rounded-lg border border-slate-300 bg-white p-3">
      <label class="text-sm">Ano (4 dígitos)
        <input id="f_novo_ano" type="text" maxlength="4" placeholder="2027" class="ml-2 w-24 rounded-lg border border-slate-300 px-2 py-1 text-sm outline-none focus:border-accent" />
      </label>
      <button onclick="criarAno()" class="rounded-lg bg-accent px-3 py-1.5 text-sm font-semibold text-white hover:bg-accentBright">Criar</button>
      <button onclick="fecharNovoAno()" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium hover:bg-slate-50">Cancelar</button>
    </div>

    <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-200 bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
            <th class="px-4 py-3">Período</th>
            <th class="px-4 py-3">Prazo final</th>
          </tr>
        </thead>
        <tbody id="tabelaBody"></tbody>
      </table>
    </div>

    <div id="msgBox" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>

    <div class="mt-4 flex justify-end">
      <button id="btnSalvar" onclick="salvar()" class="rounded-lg bg-accent px-5 py-2.5 text-sm font-semibold text-white hover:bg-accentBright">Salvar prazos</button>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/prazos.js"></script>
</body>
</html>
